name: Semgrep AppSec

on:
  workflow_dispatch:
  push:
    branches: [ "semgrep-workflow" ]
  pull_request:
    branches: [ "semgrep-workflow" ]

jobs:
  semgrep-analyze:
    runs-on: ubuntu-latest
    # Necessary permissions for Semgrep to interact with your PR
    permissions:
      contents: read
      pull-requests: write    # Required for the Bot to post comments
      security-events: write  # Required for the GitHub Security tab

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Pro Rules
        # Run standard Semgrep CI with Pro rules from Semgrep App
        run: semgrep ci --sarif --sarif-output=semgrep-pro.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Custom XSS Rules
        # Custom rules to detect XSS via PrintWriter.format() and printf()
        # These sinks are missed by default Semgrep rules
        run: semgrep scan --config semgrep-xss-rules.yaml --sarif --sarif-output=semgrep-xss.sarif src/main/java/ || true

      - name: Merge SARIF Results
        # Combine both SARIF files into one for upload
        run: |
          python3 << 'EOF'
          import json
          import sys

          def merge_sarif(files, output):
              merged = None
              for f in files:
                  try:
                      with open(f, 'r') as fp:
                          data = json.load(fp)
                      if merged is None:
                          merged = data
                      else:
                          # Merge runs from additional files
                          merged['runs'].extend(data.get('runs', []))
                  except (FileNotFoundError, json.JSONDecodeError) as e:
                      print(f"Warning: Could not process {f}: {e}", file=sys.stderr)

              if merged:
                  with open(output, 'w') as fp:
                      json.dump(merged, fp, indent=2)
                  print(f"Merged SARIF written to {output}")
              else:
                  # Create empty but valid SARIF if no results
                  empty = {"version": "2.1.0", "runs": []}
                  with open(output, 'w') as fp:
                      json.dump(empty, fp)
                  print("No results to merge, created empty SARIF")

          merge_sarif(['semgrep-pro.sarif', 'semgrep-xss.sarif'], 'semgrep.sarif')
          EOF

      # Uploads results to Security -> Code scanning alerts
      - name: Upload to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always() # Upload results even if the scan fails or finds bugs

      # Makes the raw SARIF file available in the "Actions" run summary
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()
