name: Semgrep AppSec

on:
  workflow_dispatch:
  push:
    branches: [ "semgrep-workflow" ]
  pull_request:
    branches: [ "semgrep-workflow" ]

jobs:
  semgrep-analyze:
    runs-on: ubuntu-latest
    # Necessary permissions for Semgrep to interact with your PR
    permissions:
      contents: read
      pull-requests: write    # Required for the Bot to post comments
      security-events: write  # Required for the GitHub Security tab

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep CI & Generate SARIF
        # Configuration to reduce false positives:
        # 1. Uses Semgrep CI with Pro rules for best inter-file taint analysis
        # 2. Excludes rules that don't map to OWASP Benchmark categories
        # 3. Uses .semgrepignore to exclude non-Java files (scorecard, HTML, etc.)
        #
        # Rule exclusions rationale:
        # - printstacktrace: Code quality, not security (not in benchmark categories)
        # - cookie-missing-*: Not CWE-614 (securecookie is about setSecure(false))
        # - django/python/js rules: Irrelevant for Java codebase
        # - no-direct-response-writer: Overly broad, causes many FPs
        # - unsafe-reflection/overly-permissive: Not in benchmark categories
        #
        # Note: Some false positives remain due to:
        # - SeparateClassRequest.getTheValue() returns constant "bar" (safe source)
        # - Always-true conditions like (7*42)-86>200 making tainted paths unreachable
        # These require constant propagation which Semgrep doesn't fully support.
        run: |
          semgrep ci \
            --exclude-rule "java.lang.security.audit.active-debug-code-printstacktrace.active-debug-code-printstacktrace" \
            --exclude-rule "java.servlets.security.audit.cookie-missing-samesite.cookie-missing-samesite" \
            --exclude-rule "java.lang.security.audit.cookie-missing-httponly.cookie-missing-httponly" \
            --exclude-rule "java.servlets.security.audit.cookie-missing-httponly.cookie-missing-httponly" \
            --exclude-rule "python.django.security.django-no-csrf-token.django-no-csrf-token" \
            --exclude-rule "html.security.audit.missing-integrity.missing-integrity" \
            --exclude-rule "javascript.lang.security.audit.detect-non-literal-regexp.detect-non-literal-regexp" \
            --exclude-rule "javascript.browser.security.insecure-document-method.insecure-document-method" \
            --exclude-rule "java.lang.security.audit.unsafe-reflection.unsafe-reflection" \
            --exclude-rule "java.lang.security.audit.overly-permissive-file-permission.overly-permissive-file-permission" \
            --exclude-rule "java.lang.security.net.http.base64-encoded-hardcoded-secret.base64-encoded-hardcoded-secret" \
            --exclude-rule "java.lang.security.audit.xss.no-direct-response-writer.no-direct-response-writer" \
            --sarif > semgrep.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Uploads results to Security -> Code scanning alerts
      - name: Upload to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always() # Upload results even if the scan fails or finds bugs

      # Makes the raw SARIF file available in the "Actions" run summary
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()
