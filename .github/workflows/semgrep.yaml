name: Semgrep AppSec

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  semgrep-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write    # Required for the Bot to post comments
      security-events: write  # Required for the GitHub Security tab

    container:
      image: semgrep/semgrep:1.158.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep CI & Generate SARIF
        run: semgrep ci --sarif --include='*.java' > semgrep.sarif || true
        env:
          # This token is what enables PR comments and the dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Uploads results to Security -> Code scanning alerts
      - name: Upload to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always() # Upload results even if the scan fails or finds bugs

      # Makes the raw SARIF file available in the "Actions" run summary
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v6
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()
