name: "CodeQL"

env:
  CODEQL_EXTRACTOR_JAVA_RUN_ANNOTATION_PROCESSORS: true

on:
  push:
    branches: [ dev ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ dev ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        # Get full history for spotless ratchetFrom
        with:
          fetch-depth: 0

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended, security-experimental, security-and-quality
          # Include local sources (files, env vars, CLI args) as tainted in addition to remote
          threat-model: remote,local

      - name: Build with Maven
        run: mvn -DskipTests=true install

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: ${{ runner.workspace }}/results

      - name: Rename SARIF output
        run: mv ${{ runner.workspace }}/results/java.sarif ${{ runner.workspace }}/results/codeql.sarif

      - name: Upload Output
        uses: actions/upload-artifact@v6
        with:
          name: CodeQL SARIF
          path: ${{ runner.workspace }}/results/codeql.sarif
