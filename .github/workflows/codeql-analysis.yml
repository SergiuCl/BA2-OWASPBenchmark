name: "CodeQL"

env:
  CODEQL_EXTRACTOR_JAVA_RUN_ANNOTATION_PROCESSORS: true

on:
  push:
    branches: [ dev ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ dev ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        # Get full history for spotless ratchetFrom
        with:
          fetch-depth: 0

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended, security-experimental, security-and-quality
          config-file: ./.github/codeql-config.yml

      - name: Build with Maven
        run: /usr/bin/time -v mvn -DskipTests=true install 2>&1 | tee build-timing.txt

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: ${{ runner.workspace }}/results

      - name: Measure CodeQL database size
        run: |
          echo "=== CodeQL Database Size ==="
          du -sh ${{ runner.workspace }}/codeql_databases/* 2>/dev/null || echo "Database path not found"
          du -sh /home/runner/work/_temp/codeql_databases/* 2>/dev/null || echo "Alt path not found"

      - name: Rename SARIF output
        run: mv ${{ runner.workspace }}/results/java.sarif ${{ runner.workspace }}/results/codeql.sarif

      - name: Upload Output
        uses: actions/upload-artifact@v6
        with:
          name: CodeQL SARIF
          path: ${{ runner.workspace }}/results/codeql.sarif

      - name: Upload timing data
        uses: actions/upload-artifact@v6
        with:
          name: codeql-timing
          path: build-timing.txt
        if: always()
