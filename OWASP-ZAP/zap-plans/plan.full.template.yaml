plan:
  title: "OWASP Benchmark AF Full Scan"
  description: "Active scan of OWASP Benchmark"
  version: "1.0.0"

env:
  contexts:
    - name: "benchmark"
      urls:
        - "${TARGET_URL}"
  parameters:
    failOnError: true
    failOnWarning: false

jobs:
  - type: spider
    parameters:
      context: "benchmark"
      maxDuration: 10

  - type: spiderAjax
    parameters:
      context: "benchmark"
      maxDuration: 10

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: activeScan
    parameters:
      context: "benchmark"
      policy: "Default Policy"
      maxRuleDurationInMins: 15

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "${REPORT_DIR}"
      reportFile: "full-scan-report.html"
      reportTitle: "ZAP AF Full Scan - OWASP Benchmark"

  - type: report
    parameters:
      template: "traditional-json"
      reportDir: "${REPORT_DIR}"
      reportFile: "full-scan-report.json"
      reportTitle: "ZAP AF Full Scan - OWASP Benchmark"

  - type: report
    parameters:
      template: "traditional-xml"
      reportDir: "${REPORT_DIR}"
      reportFile: "full-scan-report.xml"
      reportTitle: "ZAP AF Full Scan - OWASP Benchmark"

  - type: outputSummary
    parameters:
      format: LONG
      summaryFile: "${REPORT_DIR}/full-scan-summary.json"